<style>
  .hero-section { padding: 36px 16px 36px; }
  .hero-title { font-size: 48px; font-weight: 900; line-height: 1.04; letter-spacing: -1.6px; margin: 0 auto 18px; }
  .hero-subtitle { font-size: 22px; font-weight: 600; line-height: 1.3; margin: 0 auto 6px; opacity: 0.92; }

  .hero-grid { display: grid; grid-template-columns: 1.35fr 1fr; gap: 42px; align-items: center; margin-top: 10px; }

  .hero-video {
    position: relative; width: 100%; border-radius: 14px; overflow: hidden;
    background: #111; box-shadow: 0 18px 60px rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.08);
  }
  .hero-video::before { content: ""; display: block; padding-top: 56.25%; }

  /* ✅ Activate Sound button — top right with pulse animation */
  .sound-btn {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(0,0,0,0.70); color: #ffffff;
    border: 1.5px solid rgba(255,255,255,0.50); border-radius: 999px;
    padding: 7px 14px 7px 10px;
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px; font-weight: 800; letter-spacing: 0.3px;
    cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    white-space: nowrap;
    animation: soundPulse 2.2s ease-in-out infinite;
    transition: background 150ms ease, border-color 150ms ease, opacity 250ms ease, transform 150ms ease;
  }
  .sound-btn:hover {
    background: rgba(0,0,0,0.92); border-color: rgba(255,255,255,0.95);
    transform: scale(1.05); animation-play-state: paused;
  }
  .sound-btn.is-hidden { opacity: 0; pointer-events: none; }
  .sound-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  @keyframes soundPulse {
    0%   { transform: scale(1);    box-shadow: 0 0 0 0 rgba(255,255,255,0.30); }
    45%  { transform: scale(1.04); box-shadow: 0 0 0 6px rgba(255,255,255,0.08); }
    100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  }

  .hero-right { text-align: center; }
  .hero-kicker {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
    font-weight: 700; font-size: 13px; margin-bottom: 14px;
  }

  .hero-actions { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 22px; width: 100%; }
  .hero-btn {
    width: min(520px, 92%); height: 48px; border-radius: 12px;
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 800; font-size: 16px; letter-spacing: 0.2px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    text-decoration: none; user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .hero-btn.primary { background: #ffffff; color: #000000 !important; border: 2px solid #ffffff; }
  .hero-btn.primary:hover { opacity: 0.92; }
  .hero-btn.outline { background: transparent; color: #ffffff; border: 2px solid rgba(255,255,255,0.7); }
  .hero-btn.outline:hover { border-color: rgba(255,255,255,1); }
  .hero-btn .play {
    width: 0; height: 0;
    border-left: 10px solid #ffffff; border-top: 6px solid transparent; border-bottom: 6px solid transparent;
    transform: translateX(1px);
  }

  @media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; gap: 18px; } .hero-right { padding-top: 6px; } }
  @media (max-width: 600px) {
    .hero-section { padding-top: 0 !important; padding-bottom: 0 !important; }
    .hero-title { font-size: 30px !important; line-height: 1.12 !important; margin-top: 0 !important; margin-bottom: 12px !important; }
    .hero-subtitle { font-size: 16px !important; margin-top: 0 !important; }
    .hero-actions { margin-top: 16px; }
    .hero-btn { height: 46px; }
    .sound-btn { font-size: 11px; padding: 6px 11px 6px 8px; top: 8px; right: 8px; }
  }

  /* ===== POPUP VIDEO (MODAL) ===== */
  .video-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.72); display: none;
    align-items: center; justify-content: center; padding: 18px; z-index: 999999;
  }
  .video-modal.is-open { display: flex; }
  .video-modal__panel {
    width: min(920px, 100%); background: #0b0b0b;
    border: 1px solid rgba(255,255,255,0.14); border-radius: 14px;
    overflow: hidden; box-shadow: 0 18px 60px rgba(0,0,0,0.55);
  }
  .video-modal__topbar {
    display: grid; grid-template-columns: 40px 1fr 40px; align-items: center;
    padding: 10px 12px; background: rgba(255,255,255,0.04); color: #ffffff;
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px; font-weight: 700;
  }
  .video-modal__title { text-align: center; opacity: 0.95; padding: 0 8px; }
  .video-modal__close {
    appearance: none; border: none; background: transparent; color: #ffffff;
    font-size: 20px; line-height: 1; cursor: pointer; padding: 6px 8px;
    border-radius: 10px; justify-self: end;
  }
  .video-modal__close:hover { background: rgba(255,255,255,0.08); }
  .video-modal__video { width: 100%; aspect-ratio: 16 / 9; background: #000000; position: relative; }
  .video-modal__video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
</style>

<!-- Wistia loader -->
<script src="https://fast.wistia.com/assets/external/E-v1.js" async></script>

<div class="hero-section" style="background:#000000;color:#ffffff;text-align:center;font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif;margin:0;">
  <div style="max-width:1180px;margin:0 auto;">
    <div class="hero-grid">

      <!-- ✅ Hero video: autoplay muted, black Wistia player, button top-right -->
      <div class="hero-video" id="heroVideoWrap">
        <script src="https://fast.wistia.com/embed/medias/j1mton7xgc.jsonp" async></script>
        <div
          class="wistia_embed wistia_async_j1mton7xgc videoFoam=true autoPlay=true muted=true playerColor=000000 endVideoBehavior=loop"
          style="position:absolute;inset:0;width:100%;height:100%;"
        >&nbsp;</div>

        <!-- ✅ Pulsing button top-right -->
        <button class="sound-btn" id="activateSoundBtn" type="button" aria-label="Activate sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
          Activate Sound
        </button>
      </div>

      <!-- Right column -->
      <div class="hero-right">
        <div class="hero-kicker">Open Level</div>

        <h1 class="hero-title" style="margin-bottom:10px;">
          Traditional Bachata That Lives in the Body
        </h1>

        <p class="hero-subtitle" style="font-size:14px;font-weight:700;opacity:0.9;margin-bottom:16px;">
          Take Your Dance to the Next Level.
        </p>

        <div style="opacity:0.78;font-weight:650;font-size:13px;line-height:1.3;margin-top:8px;">
          Instructor: Carolina Rosa,<br/>Traditional Bachata Artist &amp; Educator
        </div>

        <div class="hero-actions">
          <a class="hero-btn primary" href="https://academy.ermesdance.com/pricing" target="_blank" rel="noopener">
            Get Started for 8€/month
          </a>

          <button class="hero-btn outline" type="button" id="openFreeLesson">
            <span class="play" aria-hidden="true"></span>
            Free Lesson
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ✅ POPUP Free Lesson — black Wistia iframe -->
<div class="video-modal" id="videoModal" aria-hidden="true">
  <div class="video-modal__panel" role="dialog" aria-modal="true" aria-label="Free Lesson Video">
    <div class="video-modal__topbar">
      <span aria-hidden="true"></span>
      <div class="video-modal__title">Lesson 2 - Hip Motion (FREE LESSON)</div>
      <button class="video-modal__close" type="button" id="closeVideoModal" aria-label="Close">×</button>
    </div>
    <div class="video-modal__video" id="modalVideoWrap">
      <!-- iframe injected on open -->
    </div>
  </div>
</div>

<script>
  (function () {

    /* ── Hero: Activate Sound ── */
    var heroApi  = null;
    var soundBtn = document.getElementById('activateSoundBtn');

    window._wq = window._wq || [];
    window._wq.push({
      id: 'j1mton7xgc',
      options: { autoPlay: true, muted: true, playerColor: '000000', endVideoBehavior: 'loop' },
      onReady: function (video) {
        if (video.container && !video.container.closest('#videoModal')) {
          heroApi = video;
        }
      }
    });

    if (soundBtn) {
      soundBtn.addEventListener('click', function () {
        if (heroApi) {
          heroApi.time(0);
          heroApi.unmute();
          heroApi.volume(1);
          heroApi.play();
        }
        soundBtn.classList.add('is-hidden');
      });
    }

    /* ── Modal Free Lesson ── */
    var openBtn  = document.getElementById('openFreeLesson');
    var modal    = document.getElementById('videoModal');
    var closeBtn = document.getElementById('closeVideoModal');
    var wrap     = document.getElementById('modalVideoWrap');

    function openModal() {
      // ✅ playerColor=000000 → black controls
      wrap.innerHTML =
        '<iframe src="https://fast.wistia.net/embed/iframe/bsqtbsbig6' +
        '?autoPlay=true&playerColor=000000&fitStrategy=fill" ' +
        'allowtransparency="true" allowfullscreen frameborder="0" scrolling="no" ' +
        'allow="autoplay; fullscreen" ' +
        'style="position:absolute;inset:0;width:100%;height:100%;border:0;">' +
        '</iframe>';

      modal.classList.add('is-open');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      if (closeBtn) closeBtn.focus();
      document.addEventListener('keydown', onKeyDown);
    }

    function closeModal() {
      wrap.innerHTML = '';
      modal.classList.remove('is-open');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      document.removeEventListener('keydown', onKeyDown);
    }

    function onKeyDown(e) {
      if (e.key === 'Escape') closeModal();
    }

    if (openBtn)  openBtn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      closeModal();
    });
    if (modal) modal.addEventListener('click', function (e) {
      if (e.target === modal) closeModal();
    });

  })();
</script>
