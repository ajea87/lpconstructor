<style>
  /* ===== Unlimited Access Marquee Grid (3 rows, brick + slow scroll) ===== */
  .ed-uac {
    position: relative;
    background: #000;
    color: #fff;
    padding: 72px 0 62px;
    overflow: hidden;
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;

    /* IMPORTANT: prevent text/image selection */
    -webkit-user-select: none;
    user-select: none;
  }

  /* Overall premium vignette */
  .ed-uac::before{
    content:"";
    position:absolute;
    inset:0;
    background: radial-gradient(1200px 420px at 50% 32%, rgba(0,0,0,0.10), rgba(0,0,0,0.70));
    pointer-events:none;
    z-index: 1;
  }
  .ed-uac::after{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.92), rgba(0,0,0,0) 34%),
      linear-gradient(to top, rgba(0,0,0,0.86), rgba(0,0,0,0) 34%);
    pointer-events:none;
    z-index: 2;
  }

  /* Side fade so rows blend into screen edges */
  .ed-uac__sidefade{
    position:absolute;
    top:0; bottom:0;
    width: 120px;
    pointer-events:none;
    z-index: 6;
  }
  .ed-uac__sidefade.left{
    left:0;
    background: linear-gradient(to right, rgba(0,0,0,0.98), rgba(0,0,0,0));
  }
  .ed-uac__sidefade.right{
    right:0;
    background: linear-gradient(to left, rgba(0,0,0,0.98), rgba(0,0,0,0));
  }

  /* ===== FIXED OVERLAY (no hover, always on) ===== */
  .ed-uac__overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index: 7;
    opacity: 0.22; /* adjust for more/less darkness */
    background:
      radial-gradient(900px 380px at 50% 55%, rgba(0,0,0,0.18), rgba(0,0,0,0.00) 55%),
      linear-gradient(to bottom, rgba(0,0,0,0.22), rgba(0,0,0,0.10) 40%, rgba(0,0,0,0.28));
  }

  /* ===== Header CTA (sits into first row) ===== */
  .ed-uac__header{
    position: relative;
    z-index: 9;
    text-align: center;
    max-width: 1100px;
    margin: 0 auto 0;
    padding: 0 16px;
    transform: translateY(34px);
  }
  .ed-uac__title{
    margin: 0 0 16px;
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }
  .ed-uac__btn{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 46px;
    padding: 0 26px;
    border-radius: 12px;
    background: #fff;
    color: #111 !important;
    text-decoration: none;
    font-weight: 800;
    font-size: 16px;
    border: 2px solid #fff;
    box-shadow: 0 14px 40px rgba(0,0,0,0.55);
  }
  .ed-uac__btn:hover{ opacity: 0.92; }

  /* Rows container: FULL BLEED */
  .ed-uac__rows{
    position: relative;
    z-index: 5;
    width: 100%;
    margin: 0;
    padding: 0;
    margin-top: -18px;
  }

  .ed-row{
    position: relative;
    overflow: hidden;
    margin: 14px 0;
  }

  /* Stronger fade over the FIRST row */
  .ed-row--topfade::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.94), rgba(0,0,0,0.10) 70%, rgba(0,0,0,0.70));
    pointer-events:none;
    z-index: 8;
  }

  /* Brick offset for middle row */
  .ed-row--offset .ed-track{
    transform: translateX(-90px);
  }

  .ed-track{
    display: flex;
    width: max-content;
    gap: 16px;
    will-change: transform;

    /* IMPORTANT: keep animation running even when hovered */
    animation-play-state: running !important;
  }

  /* Tile proportions */
  .ed-tile{
    position: relative;
    flex: 0 0 auto;
    width: 290px;
    height: 160px;
    border-radius: 18px;
    overflow: hidden;
    background: #111;
    box-shadow: 0 14px 40px rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.06);
    transform: translateZ(0);
    opacity: 0.92;

    /* IMPORTANT: avoid selection / dragging behaviour */
    -webkit-user-drag: none;
    user-drag: none;
  }
  .ed-tile img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(1.05) contrast(1.02);
    transform: scale(1.01);

    /* IMPORTANT: avoid selection / dragging behaviour */
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: none; /* prevents hover selecting images */
  }

  /* IMPORTANT: remove any tile hover effects completely */
  .ed-tile::after{ display:none !important; }

  /* Animations */
  @keyframes ed-scroll-rtl {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @keyframes ed-scroll-ltr {
    from { transform: translateX(-50%); }
    to   { transform: translateX(0); }
  }
  .ed-row--rtl .ed-track{ animation: ed-scroll-rtl 78s linear infinite; }
  .ed-row--ltr .ed-track{ animation: ed-scroll-ltr 84s linear infinite; }

  /* Responsive */
  @media (max-width: 980px){
    .ed-uac__title{ font-size: 36px; }
    .ed-uac__header{ transform: translateY(28px); }
    .ed-uac__rows{ margin-top: -14px; }
    .ed-tile{ width: 250px; height: 140px; border-radius: 16px; }
    .ed-row{ margin: 12px 0; }
    .ed-track{ gap: 14px; }
    .ed-row--offset .ed-track{ transform: translateX(-70px); }
    .ed-uac__sidefade{ width: 90px; }
    .ed-uac__overlay{ opacity: 0.20; }
  }
  @media (max-width: 600px){
    .ed-uac{ padding: 54px 0 48px; }
    .ed-uac__title{ font-size: 28px; }
    .ed-uac__header{ transform: translateY(18px); }
    .ed-uac__rows{ margin-top: -10px; }
    .ed-uac__btn{ height: 44px; padding: 0 22px; font-size: 15px; }
    .ed-tile{ width: 210px; height: 120px; border-radius: 14px; }
    .ed-track{ gap: 12px; }
    .ed-row--offset .ed-track{ transform: translateX(-55px); }
    .ed-row--rtl .ed-track{ animation-duration: 62s; }
    .ed-row--ltr .ed-track{ animation-duration: 68s; }
    .ed-uac__sidefade{ width: 70px; }
    .ed-uac__overlay{ opacity: 0.18; }
  }

  /* ===== Minimal Footer (new) ===== */
  .ed-footer{
    background:#000;
    color:rgba(255,255,255,0.60);
    font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif;
    padding: 18px 16px 26px;
    text-align:center;
    user-select:none;
    -webkit-user-select:none;
  }
  .ed-footer__wrap{
    max-width:1100px;
    margin:0 auto;
  }
  .ed-footer__divider{
    height:1px;
    background:rgba(255,255,255,0.08);
    margin: 0 auto 14px;
    width: min(820px, 100%);
  }
  .ed-footer__logo{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom: 8px;
    opacity: 0.85;
  }
  .ed-footer__logo img{
    height: 50px;
    width:auto;
    display:block;
    opacity: 0.82;
    filter: grayscale(100%) contrast(1.05);
    -webkit-user-drag:none;
    user-drag:none;
    pointer-events:none;
  }
  .ed-footer__text{
    font-size: 12px;
    letter-spacing: 0.02em;
    line-height: 1.4;
  }
</style>
